# Alembic — миграции базы данных
#
# Что такое миграция:
# Когда ты меняешь модель (добавляешь поле, таблицу) —
# нужно изменить и реальную БД. Миграция = SQL-скрипт
# который вносит эти изменения. Alembic генерирует их
# автоматически по разнице между моделями и БД.
#
# Основные команды (выполнять из корня проекта):
#
#   # Создать новую миграцию (Alembic сравнит модели с БД):
#   alembic revision --autogenerate -m "add notes table"
#
#   # Применить все миграции:
#   alembic upgrade head
#
#   # Откатить последнюю миграцию:
#   alembic downgrade -1
#
#   # Посмотреть текущую версию:
#   alembic current
#
#   # История миграций:
#   alembic history

[alembic]
# Путь к папке с миграциями
script_location = alembic

# Шаблон имени файла миграции
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s

# URL базы данных — подставляется из кода (env.py), не из этого файла
# sqlalchemy.url = заполняется программно

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
