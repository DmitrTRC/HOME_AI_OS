  <line x1="60" y1="58" x2="50" y2="68" stroke="#e94560" stroke-width="1.5" opacity="0.6"/>
  <line x1="60" y1="58" x2="70" y2="68" stroke="#e94560" stroke-width="1.5" opacity="0.6"/>
  <line x1="50" y1="68" x2="55" y2="78" stroke="#533483" stroke-width="1.5" opacity="0.6"/>
  <line x1="70" y1="68" x2="65" y2="78" stroke="#533483" stroke-width="1.5" opacity="0.6"/>
