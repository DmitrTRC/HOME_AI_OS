# ============================================================
# CI Pipeline — проверка кода при каждом push/PR
# ============================================================
# GitHub Actions — встроенный CI/CD в GitHub.
# При каждом push или pull request:
# 1. Запускает контейнеры (PostgreSQL, Redis)
# 2. Ставит зависимости
# 3. Проверяет код линтером (ruff)
# 4. Запускает тесты
# ============================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: unified_ops_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: test
      APP_DEBUG: false
      APP_SECRET_KEY: test-secret-key-for-ci-only
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: unified_ops_test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      S3_ENDPOINT_URL: http://localhost:9000
      S3_ACCESS_KEY: test
      S3_SECRET_KEY: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev tesseract-ocr ffmpeg

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src/ workers/ tests/

      - name: Run tests
        run: pytest -v --tb=short
